<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2015 FCE 1 Test 1 U+R Split Screen</title>
    <!-- Load Mozilla's PDF.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100%;
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
            background: #1e1e1e;
        }

        .container {
            display: flex;
            width: 100%;
            height: 100%;
            transition: flex-direction 0.2s ease;
        }

        .split {
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* Left Side: Google Form */
        .left-side {
            width: 50%; 
            min-width: 200px;
            background: #ffffff;
        }

        .left-side iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* The Draggable Resizer Bar */
        .resizer {
            width: 8px;
            height: 100%;
            background: #ccc;
            cursor: col-resize;
            z-index: 20;
            position: relative;
        }
        .resizer:hover, .resizer.dragging { background: #007bff; }

        /* Right Side Layout */
        .right-side {
            flex: 1; 
            min-width: 200px;
            background: #525659;
        }

        .toolbar {
            background: #ffffff;
            padding: 10px;
            display: flex;
            gap: 12px;
            align-items: center;
            border-bottom: 1px solid #ccc;
            z-index: 30;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 14px;
        }

        /* Tool Mode Buttons styling */
        .tool-btn {
            padding: 6px 12px;
            font-size: 14px;
            font-weight: bold;
            border: 1px solid #ccc;
            background: #f8f9fa;
            cursor: pointer;
            border-radius: 4px;
            touch-action: manipulation;
        }
        .tool-btn.active {
            background: #007bff;
            color: white;
            border-color: #0056b3;
        }

        /* The Scroll Container for Pages */
        .pdf-scroll-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        /* Wrapper for an individual page + its canvas */
        .page-wrapper {
            position: relative;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            background: white;
            max-width: 100%;
        }

        /* The actual canvas rendering the PDF text/images */
        .pdf-page-canvas {
            display: block;
            z-index: 1;
            max-width: 100%;
            height: auto !important;
        }

        /* The drawing canvas stacked perfectly over that specific page */
        .annotation-canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
            opacity: 0.5; /* Adjusted default opacity as requested */
            max-width: 100%;
            height: auto !important;
        }
        
        .annotation-canvas.pen-mode { cursor: crosshair; }
        .annotation-canvas.eraser-mode { cursor: pointer; }

        .dragging-active iframe {
            pointer-events: none;
        }

        #loading-text { color: white; font-weight: bold; margin-top: 20px; text-align: center; line-height: 1.5; }

        /* Mobile Bottom Tab Bar Navigation */
        .mobile-nav {
            display: none;
            height: 60px;
            background: #ffffff;
            border-top: 1px solid #ccc;
            z-index: 100;
        }

        .mobile-tab {
            flex: 1;
            border: none;
            background: none;
            font-size: 15px;
            font-weight: bold;
            color: #555;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .mobile-tab.active {
            color: #007bff;
            background: #f0f7ff;
        }

        /* --- MOBILE ADAPTIVE RESPONSIVENESS OVERRIDES --- */
        @media (max-width: 767px) {
            body, html {
                height: 100%;
            }
            
            .container {
                flex-direction: column;
                height: calc(100% - 60px); /* Leave room for bottom tabs */
            }

            .resizer {
                display: none !important; /* Hide resizer on mobile */
            }

            .split {
                width: 100% !important;
                height: 100% !important;
                position: absolute;
                top: 0;
                left: 0;
                opacity: 0;
                pointer-events: none;
                z-index: 1;
            }

            /* Display selected active view panel overlay stack completely */
            .split.active-view {
                opacity: 1;
                pointer-events: auto;
                z-index: 5;
            }

            .toolbar {
                padding: 8px;
                gap: 8px;
                justify-content: space-between;
            }

            .control-group label {
                font-size: 12px;
            }

            .info-text {
                display: none !important; /* Hide helper descriptive text on small viewports */
            }

            .mobile-nav {
                display: flex; /* Show tab navigation natively */
            }
        }
    </style>
</head>
<body>

    <div class="container" id="main-container">
        
        <!-- LEFT PANEL: Google Form (Active default on mobile) -->
        <div class="split left-side active-view" id="left-panel">
            <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSc_ucH7zf5AQ3J4bfP2thNjO06bPlhBciNCedu7uVK3QO1s3A/viewform?embedded=true">Loading…</iframe>
        </div>

        <!-- MIDDLE RESIZER: Hidden on mobile via CSS -->
        <div class="resizer" id="drag-bar"></div>

        <!-- RIGHT PANEL: Scrollable PDF Canvas Screen -->
        <div class="split right-side" id="right-panel">
            
            <div class="toolbar">
                <button id="btn-pen" class="tool-btn active">✏️ Pen</button>
                <button id="btn-eraser" class="tool-btn">🧽 Rubber</button>

                <div class="control-group" id="color-group">
                    <label for="color">Color:</label>
                    <input type="color" id="color" value="#ff0000">
                </div>
                <div class="control-group">
                    <label for="thickness">Size:</label>
                    <input type="range" id="thickness" min="1" max="20" value="3" style="width: 50px;">
                </div>
                <div class="control-group" id="opacity-group">
                    <label for="opacity">Opacity:</label>
                    <input type="range" id="opacity" min="0.1" max="1" step="0.1" value="0.5" style="width: 60px;">
                    <span id="opacity-val">50%</span>
                </div>
                <span id="zoom-display" style="font-size: 12px; font-weight: bold; color: #007bff;">Zoom: 100%</span>
                <span class="info-text" style="font-size: 11px; color: #666; margin-left: auto;">Pinch trackpad to Zoom.</span>
            </div>

            <div class="pdf-scroll-container" id="pdf-viewer-container">
                <div id="loading-text">Loading exam paper structure...</div>
            </div>

        </div>
    </div>

    <!-- Mobile Navigation Dock Footer Bar -->
    <div class="mobile-nav" id="mobile-dock">
        <button class="mobile-tab active" id="tab-form">
            <span>📝</span>
            <span>Answer Sheet</span>
        </button>
        <button class="mobile-tab" id="tab-pdf">
            <span>📄</span>
            <span>View Exam</span>
        </button>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        const pdfUrl = '2015FCE1-1UR.pdf';

        const viewerContainer = document.getElementById('pdf-viewer-container');
        const leftPanel = document.getElementById('left-panel');
        const rightPanel = document.getElementById('right-panel');
        const dragBar = document.getElementById('drag-bar');
        const mainContainer = document.getElementById('main-container');

        const colorInput = document.getElementById('color');
        const thicknessInput = document.getElementById('thickness');
        const opacityInput = document.getElementById('opacity');
        const opacityVal = document.getElementById('opacity-val');
        const zoomDisplay = document.getElementById('zoom-display');

        const btnPen = document.getElementById('btn-pen');
        const btnEraser = document.getElementById('btn-eraser');
        const colorGroup = document.getElementById('color-group');
        const opacityGroup = document.getElementById('opacity-group');

        const tabForm = document.getElementById('tab-form');
        const tabPdf = document.getElementById('tab-pdf');

        let pdfDoc = null;
        let isDraggingResizer = false;
        let isDrawing = false;
        let lastX = 0, lastY = 0;
        
        // Dynamically adjust starting zoom context for smaller responsive form structures
        let currentScale = window.innerWidth < 768 ? 0.95 : 1.3; 
        const MIN_SCALE = 0.4;
        const MAX_SCALE = 4.0;
        
        let drawingHistory = {}; 
        let currentMode = 'pen'; 

        // Mobile Switch Tab Logic Execution Block
        tabForm.addEventListener('click', () => {
            tabForm.classList.add('active');
            tabPdf.classList.remove('active');
            leftPanel.classList.add('active-view');
            rightPanel.classList.remove('active-view');
        });

        tabPdf.addEventListener('click', () => {
            tabPdf.classList.add('active');
            tabForm.classList.remove('active');
            rightPanel.classList.add('active-view');
            leftPanel.classList.remove('active-view');
        });

        // Toggle Tool Modes
        btnPen.addEventListener('click', () => {
            currentMode = 'pen';
            btnPen.classList.add('active');
            btnEraser.classList.remove('active');
            colorGroup.style.opacity = "1";
            opacityGroup.style.opacity = "1";
            document.querySelectorAll('.annotation-canvas').forEach(c => c.className = 'annotation-canvas pen-mode');
        });

        btnEraser.addEventListener('click', () => {
            currentMode = 'eraser';
            btnEraser.classList.add('active');
            btnPen.classList.remove('active');
            colorGroup.style.opacity = "0.3"; 
            opacityGroup.style.opacity = "0.3";
            document.querySelectorAll('.annotation-canvas').forEach(c => c.className = 'annotation-canvas eraser-mode');
        });

        // Initialize and load the PDF document
        pdfjsLib.getDocument(pdfUrl).promise.then(pdf => {
            pdfDoc = pdf;
            document.getElementById('loading-text').remove();
            renderAllPages();
        }).catch(err => {
            document.getElementById('loading-text').innerHTML = 'Error loading PDF file from GitHub.';
            console.error(err);
        });

        function renderAllPages() {
            viewerContainer.innerHTML = '';
            for (let pageNum = 1; pageNum <= pdfDoc.numPages; pageNum++) {
                if (!drawingHistory[pageNum]) drawingHistory[pageNum] = [];
                renderPage(pageNum);
            }
            zoomDisplay.textContent = `Zoom: ${Math.round(currentScale * 100)}%`;
        }

        function renderPage(pageNum) {
            pdfDoc.getPage(pageNum).then(page => {
                const viewport = page.getViewport({ scale: currentScale });

                const wrapper = document.createElement('div');
                wrapper.className = 'page-wrapper';
                wrapper.style.width = viewport.width + 'px';
                wrapper.style.height = viewport.height + 'px';

                const pdfCanvas = document.createElement('canvas');
                pdfCanvas.className = 'pdf-page-canvas';
                pdfCanvas.width = viewport.width;
                pdfCanvas.height = viewport.height;
                const pdfContext = pdfCanvas.getContext('2d');

                const drawingCanvas = document.createElement('canvas');
                drawingCanvas.className = `annotation-canvas ${currentMode}-mode`;
                drawingCanvas.width = viewport.width;
                drawingCanvas.height = viewport.height;
                
                wrapper.appendChild(pdfCanvas);
                wrapper.appendChild(drawingCanvas);
                viewerContainer.appendChild(wrapper);

                page.render({ canvasContext: pdfContext, viewport: viewport });
                
                redrawPageAnnotations(pageNum, drawingCanvas);
                setupDrawingEvents(pageNum, drawingCanvas);
            });
        }

        function redrawPageAnnotations(pageNum, canvas) {
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            canvas.style.opacity = opacityInput.value;

            const pageHistory = drawingHistory[pageNum] || [];
            pageHistory.forEach(stroke => {
                if (stroke.points.length < 1) return;
                ctx.beginPath();
                
                const startX = stroke.points[0].x * canvas.width;
                const startY = stroke.points[0].y * canvas.height;
                ctx.moveTo(startX, startY);

                for(let i = 1; i < stroke.points.length; i++) {
                    const nextX = stroke.points[i].x * canvas.width;
                    const nextY = stroke.points[i].y * canvas.height;
                    ctx.lineTo(nextX, nextY);
                }
                ctx.lineWidth = stroke.thickness * (currentScale / 1.3);
                ctx.strokeStyle = stroke.color;
                ctx.stroke();
            });
        }

        function setupDrawingEvents(pageNum, canvas) {
            const ctx = canvas.getContext('2d');
            let currentStrokePoints = [];

            function getCoordinates(e) {
                const rect = canvas.getBoundingClientRect();
                
                // Track finger touch pointers safely
                let clientX, clientY;
                if (e.touches && e.touches.length > 0) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }

                return {
                    x: clientX - rect.left,
                    y: clientY - rect.top
                };
            }

            function checkErase(x, y) {
                const normX = x / canvas.width;
                const normY = y / canvas.height;
                const eraseRadius = (thicknessInput.value / canvas.width) * 3.5; 
                
                let pageHistory = drawingHistory[pageNum] || [];
                let modified = false;

                for (let i = pageHistory.length - 1; i >= 0; i--) {
                    const stroke = pageHistory[i];
                    for (let p = 0; p < stroke.points.length; p++) {
                        const pt = stroke.points[p];
                        const distance = Math.sqrt((pt.x - normX)**2 + (pt.y - normY)**2);
                        
                        if (distance < eraseRadius) {
                            pageHistory.splice(i, 1); 
                            modified = true;
                            break;
                        }
                    }
                }
                
                if (modified) {
                    drawingHistory[pageNum] = pageHistory;
                    redrawPageAnnotations(pageNum, canvas);
                }
            }

            function start(e) {
                if (isDraggingResizer) return;
                
                const coords = getCoordinates(e);
                
                // Allow two-finger scrolling down pages natively on mobile panels without drawing accidental dots
                if (e.touches && e.touches.length > 1) {
                    isDrawing = false;
                    return; 
                }

                isDrawing = true;
                lastX = coords.x;
                lastY = coords.y;
                
                if (currentMode === 'pen') {
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    currentStrokePoints = [{ x: coords.x / canvas.width, y: coords.y / canvas.height }];
                } else if (currentMode === 'eraser') {
                    checkErase(coords.x, coords.y);
                }
            }

            function draw(e) {
                if (!isDrawing) return;
                if (e.touches && e.touches.length > 1) return; // ignore multi-touch drawing gestures

                const coords = getCoordinates(e);

                if (currentMode === 'pen') {
                    ctx.beginPath();
                    ctx.moveTo(lastX, lastY);
                    ctx.lineTo(coords.x, coords.y);
                    ctx.lineWidth = thicknessInput.value;
                    ctx.strokeStyle = colorInput.value;
                    ctx.stroke();

                    lastX = coords.x;
                    lastY = coords.y;
                    currentStrokePoints.push({ x: coords.x / canvas.width, y: coords.y / canvas.height });
                } else if (currentMode === 'eraser') {
                    checkErase(coords.x, coords.y);
                }
            }

            function stop() {
                if (isDrawing) {
                    isDrawing = false;
                    if(currentMode === 'pen' && currentStrokePoints.length > 0) {
                        drawingHistory[pageNum].push({
                            points: currentStrokePoints,
                            color: colorInput.value,
                            thickness: thicknessInput.value / (currentScale / 1.3)
                        });
                    }
                }
            }

            canvas.addEventListener('mousedown', start);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stop);
            canvas.addEventListener('mouseleave', stop);

            // Handle mobile native overlay touch contexts directly
            canvas.addEventListener('touchstart', (e) => { 
                start(e); 
                if (e.touches.length === 1 && currentMode === 'pen') e.preventDefault(); 
            }, { passive: false });
            
            canvas.addEventListener('touchmove', (e) => { 
                draw(e); 
                if (e.touches.length === 1 && currentMode === 'pen') e.preventDefault(); 
            }, { passive: false });
            
            canvas.addEventListener('touchend', stop);
        }

        // Global Trackpad Zoom Catch Elements
        let isHoveringPDF = false;
        viewerContainer.addEventListener('mouseenter', () => { isHoveringPDF = true; });
        viewerContainer.addEventListener('mouseleave', () => { isHoveringPDF = false; });

        window.addEventListener('wheel', function(e) {
            if (e.ctrlKey) {
                if (isHoveringPDF) {
                    e.preventDefault(); 

                    let zoomFactor = 1 - e.deltaY * 0.002; 
                    let newScale = currentScale * zoomFactor;

                    if (newScale < MIN_SCALE) newScale = MIN_SCALE;
                    if (newScale > MAX_SCALE) newScale = MAX_SCALE;

                    if (newScale !== currentScale) {
                        currentScale = newScale;
                        
                        if(window.zoomTimeout) cancelAnimationFrame(window.zoomTimeout);
                        window.zoomTimeout = requestAnimationFrame(() => {
                            renderAllPages();
                        });
                    }
                } else {
                    e.preventDefault();
                }
            }
        }, { passive: false });

        opacityInput.addEventListener('input', (e) => {
            opacityVal.textContent = Math.round(e.target.value * 100) + '%';
            document.querySelectorAll('.annotation-canvas').forEach(c => c.style.opacity = e.target.value);
        });

        // Desktop panel resizer logic runs when view handles allow it
        dragBar.addEventListener('mousedown', () => {
            isDraggingResizer = true;
            dragBar.classList.add('dragging');
            mainContainer.classList.add('dragging-active');
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDraggingResizer) return;
            let percentage = (e.clientX / window.innerWidth) * 100;
            if (percentage > 15 && percentage < 85) {
                leftPanel.style.width = percentage + '%';
            }
        });

        document.addEventListener('mouseup', () => {
            if (isDraggingResizer) {
                isDraggingResizer = false;
                dragBar.classList.remove('dragging');
                mainContainer.classList.remove('dragging-active');
            }
        });

        // Trigger safe scaling adjust rules if student tilts orientation mid-session
        window.addEventListener('resize', () => {
            if (window.innerWidth >= 768) {
                leftPanel.classList.remove('active-view');
                rightPanel.classList.remove('active-view');
            }
        });
    </script>
</body>
</html>
