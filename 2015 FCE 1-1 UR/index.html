<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2015 FCE 1 Test 1 U+R Split Screen</title>
    <!-- Load Mozilla's PDF.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100%;
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
            background: #1e1e1e;
            overscroll-behavior-y: contain; 
        }

        .container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        .split {
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* Left Side: Google Form */
        .left-side {
            width: 50%; 
            min-width: 150px;
            background: #ffffff;
        }

        .left-side iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Resizer Bar */
        .resizer {
            width: 12px;
            height: 100%;
            background: #ccc;
            cursor: col-resize;
            z-index: 20;
            position: relative;
            touch-action: none;
        }
        .resizer::after {
            content: '';
            position: absolute;
            left: 4px;
            top: 0;
            width: 4px;
            height: 100%;
            background: #999;
        }
        .resizer:hover::after, .resizer.dragging::after { background: #007bff; }

        /* Right Side Layout */
        .right-side {
            flex: 1; 
            min-width: 150px;
            background: #525659;
        }

        .toolbar {
            background: #ffffff;
            padding: 8px 12px;
            display: flex;
            gap: 10px;
            align-items: center;
            border-bottom: 1px solid #ccc;
            z-index: 30;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
        }

        .tool-btn {
            padding: 6px 10px;
            font-size: 13px;
            font-weight: bold;
            border: 1px solid #ccc;
            background: #f8f9fa;
            cursor: pointer;
            border-radius: 4px;
            touch-action: manipulation;
        }
        .tool-btn.active {
            background: #007bff;
            color: white;
            border-color: #0056b3;
        }
        
        .fullscreen-btn {
            margin-left: auto;
            background: #28a745;
            color: white;
            border-color: #1e7e34;
        }

        /* Fixed Viewport Area for viewport containment */
        .pdf-viewport {
            flex: 1;
            overflow: hidden;
            position: relative;
            background: #525659;
        }

        /* Hardware Accelerated Smooth Interactive Layer */
        .pdf-transform-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform-origin: 0 0;
            will-change: transform;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            padding: 10px;
            /* Normal scrolling when not multi-touch pinching */
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* When user pinches, lock the scrolling to avoid jumpiness */
        .pdf-transform-container.pinching {
            overflow-y: hidden;
        }

        .page-wrapper {
            position: relative;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            background: white;
            max-width: 100%;
            flex-shrink: 0;
        }

        .pdf-page-canvas {
            display: block;
            z-index: 1;
            max-width: 100%;
            height: auto !important;
        }

        .annotation-canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
            opacity: 0.5;
            max-width: 100%;
            height: auto !important;
            touch-action: none;
        }
        
        .annotation-canvas.pen-mode { cursor: crosshair; }
        .annotation-canvas.eraser-mode { cursor: pointer; }

        .dragging-active iframe {
            pointer-events: none;
        }

        #loading-text { color: white; font-weight: bold; margin-top: 20px; text-align: center; }

        @media (max-width: 600px) and (orientation: portrait) {
            .container { flex-direction: column; }
            .left-side { width: 100% !important; height: 45%; }
            .resizer { width: 100%; height: 12px; cursor: row-resize; }
            .resizer::after { left: 0; top: 4px; width: 100%; height: 4px; }
            .right-side { width: 100% !important; height: 55%; }
            .fullscreen-btn { margin-left: 0; }
        }
    </style>
</head>
<body>

    <div class="container" id="main-container">
        
        <!-- LEFT PANEL: Google Form -->
        <div class="split left-side" id="left-panel">
            <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSc_ucH7zf5AQ3J4bfP2thNjO06bPlhBciNCedu7uVK3QO1s3A/viewform?embedded=true">Loading…</iframe>
        </div>

        <!-- MIDDLE RESIZER -->
        <div class="resizer" id="drag-bar"></div>

        <!-- RIGHT PANEL: PDF Viewer -->
        <div class="split right-side" id="right-panel">
            
            <div class="toolbar">
                <button id="btn-pen" class="tool-btn active">✏️ Pen</button>
                <button id="btn-eraser" class="tool-btn">🧽 Rubber</button>

                <div class="control-group" id="color-group">
                    <label for="color">Color:</label>
                    <input type="color" id="color" value="#ff0000">
                </div>
                <div class="control-group">
                    <label for="thickness">Size:</label>
                    <input type="range" id="thickness" min="1" max="20" value="3" style="width: 50px;">
                </div>
                <div class="control-group" id="opacity-group">
                    <label for="opacity">Opacity:</label>
                    <input type="range" id="opacity" min="0.1" max="1" step="0.1" value="0.5" style="width: 50px;">
                    <span id="opacity-val">50%</span>
                </div>
                <span id="zoom-display" style="font-size: 12px; font-weight: bold; color: #007bff;">Zoom: 100%</span>
                <button id="btn-fullscreen" class="tool-btn fullscreen-btn">📺 Fullscreen</button>
            </div>

            <!-- New Viewport Structure for Fluid Transforming -->
            <div class="pdf-viewport">
                <div class="pdf-transform-container" id="pdf-transform-layer">
                    <div id="loading-text">Loading exam paper structure...</div>
                </div>
            </div>

        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        const pdfUrl = '2015FCE1-1UR.pdf';

        const transformLayer = document.getElementById('pdf-transform-layer');
        const leftPanel = document.getElementById('left-panel');
        const rightPanel = document.getElementById('right-panel');
        const dragBar = document.getElementById('drag-bar');
        const mainContainer = document.getElementById('main-container');

        const colorInput = document.getElementById('color');
        const thicknessInput = document.getElementById('thickness');
        const opacityInput = document.getElementById('opacity');
        const opacityVal = document.getElementById('opacity-val');
        const zoomDisplay = document.getElementById('zoom-display');

        const btnPen = document.getElementById('btn-pen');
        const btnEraser = document.getElementById('btn-eraser');
        const btnFullscreen = document.getElementById('btn-fullscreen');
        const colorGroup = document.getElementById('color-group');
        const opacityGroup = document.getElementById('opacity-group');

        let pdfDoc = null;
        let isDraggingResizer = false;
        let isDrawing = false;
        let lastX = 0, lastY = 0;
        
        let currentScale = window.innerWidth < 900 ? 0.9 : 1.3; 
        const MIN_SCALE = 0.4;
        const MAX_SCALE = 4.0;
        
        let drawingHistory = {}; 
        let currentMode = 'pen'; 

        // Smooth GPU Transform tracking parameters
        let baseTransformScale = 1.0; 
        let currentTransformScale = 1.0;
        let startTouchDistance = 0;

        const sharpnessFactor = 1.2;

        btnPen.addEventListener('click', () => {
            currentMode = 'pen';
            btnPen.classList.add('active');
            btnEraser.classList.remove('active');
            colorGroup.style.opacity = "1";
            opacityGroup.style.opacity = "1";
            document.querySelectorAll('.annotation-canvas').forEach(c => c.className = 'annotation-canvas pen-mode');
        });

        btnEraser.addEventListener('click', () => {
            currentMode = 'eraser';
            btnEraser.classList.add('active');
            btnPen.classList.remove('active');
            colorGroup.style.opacity = "0.3"; 
            opacityGroup.style.opacity = "0.3";
            document.querySelectorAll('.annotation-canvas').forEach(c => c.className = 'annotation-canvas eraser-mode');
        });

        btnFullscreen.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().then(() => {
                    btnFullscreen.textContent = "❌ Exit";
                }).catch(err => {
                    console.error(`Fullscreen error: ${err.message}`);
                });
            } else {
                document.exitFullscreen().then(() => {
                    btnFullscreen.textContent = "📺 Fullscreen";
                });
            }
        });

        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) btnFullscreen.textContent = "📺 Fullscreen";
        });

        pdfjsLib.getDocument(pdfUrl).promise.then(pdf => {
            pdfDoc = pdf;
            document.getElementById('loading-text').remove();
            renderAllPages();
        }).catch(err => {
            document.getElementById('loading-text').innerHTML = 'Error loading PDF file.';
            console.error(err);
        });

        function renderAllPages() {
            const preservedScroll = transformLayer.scrollTop;
            transformLayer.innerHTML = '';
            
            // Reset GPU visual layers to 1:1 scale before building crisp canvas layers
            transformLayer.style.transform = `scale(1)`;
            baseTransformScale = 1.0;
            currentTransformScale = 1.0;

            for (let pageNum = 1; pageNum <= pdfDoc.numPages; pageNum++) {
                if (!drawingHistory[pageNum]) drawingHistory[pageNum] = [];
                renderPage(pageNum);
            }
            zoomDisplay.textContent = `Zoom: ${Math.round(currentScale * 100)}%`;
            transformLayer.scrollTop = preservedScroll;
        }

        function renderPage(pageNum) {
            pdfDoc.getPage(pageNum).then(page => {
                const viewport = page.getViewport({ scale: currentScale });

                const wrapper = document.createElement('div');
                wrapper.className = 'page-wrapper';
                wrapper.style.width = viewport.width + 'px';
                wrapper.style.height = viewport.height + 'px';

                const pdfCanvas = document.createElement('canvas');
                pdfCanvas.className = 'pdf-page-canvas';
                pdfCanvas.width = viewport.width * sharpnessFactor;
                pdfCanvas.height = viewport.height * sharpnessFactor;
                pdfCanvas.style.width = viewport.width + 'px';
                pdfCanvas.style.height = viewport.height + 'px';
                
                const pdfContext = pdfCanvas.getContext('2d');
                pdfContext.scale(sharpnessFactor, sharpnessFactor);

                const drawingCanvas = document.createElement('canvas');
                drawingCanvas.className = `annotation-canvas ${currentMode}-mode`;
                drawingCanvas.width = viewport.width * sharpnessFactor;
                drawingCanvas.height = viewport.height * sharpnessFactor;
                drawingCanvas.style.width = viewport.width + 'px';
                drawingCanvas.style.height = viewport.height + 'px';
                
                wrapper.appendChild(pdfCanvas);
                wrapper.appendChild(drawingCanvas);
                transformLayer.appendChild(wrapper);

                page.render({ canvasContext: pdfContext, viewport: viewport });
                redrawPageAnnotations(pageNum, drawingCanvas);
                setupDrawingEvents(pageNum, drawingCanvas);
            });
        }

        function redrawPageAnnotations(pageNum, canvas) {
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            canvas.style.opacity = opacityInput.value;

            const pageHistory = drawingHistory[pageNum] || [];
            pageHistory.forEach(stroke => {
                if (stroke.points.length < 1) return;
                ctx.beginPath();
                ctx.moveTo(stroke.points[0].x * canvas.width, stroke.points[0].y * canvas.height);

                for(let i = 1; i < stroke.points.length; i++) {
                    ctx.lineTo(stroke.points[i].x * canvas.width, stroke.points[i].y * canvas.height);
                }
                ctx.lineWidth = stroke.thickness * sharpnessFactor * (currentScale / 1.3);
                ctx.strokeStyle = stroke.color;
                ctx.stroke();
            });
        }

        function setupDrawingEvents(pageNum, canvas) {
            const ctx = canvas.getContext('2d');
            let currentStrokePoints = [];

            function getCoordinates(e) {
                const rect = canvas.getBoundingClientRect();
                let clientX, clientY;
                if (e.touches && e.touches.length > 0) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }
                
                // Account for real-time CSS scale transformations dynamically
                return {
                    x: ((clientX - rect.left) / (rect.width / canvas.width)),
                    y: ((clientY - rect.top) / (rect.height / canvas.height))
                };
            }

            function checkErase(x, y) {
                const normX = x / canvas.width;
                const normY = y / canvas.height;
                const eraseRadius = (thicknessInput.value * sharpnessFactor / canvas.width) * 4.0; 
                let pageHistory = drawingHistory[pageNum] || [];
                let modified = false;

                for (let i = pageHistory.length - 1; i >= 0; i--) {
                    const stroke = pageHistory[i];
                    for (let p = 0; p < stroke.points.length; p++) {
                        if (Math.sqrt((stroke.points[p].x - normX)**2 + (stroke.points[p].y - normY)**2) < eraseRadius) {
                            pageHistory.splice(i, 1); 
                            modified = true;
                            break;
                        }
                    }
                }
                if (modified) {
                    drawingHistory[pageNum] = pageHistory;
                    redrawPageAnnotations(pageNum, canvas);
                }
            }

            function start(e) {
                if (isDraggingResizer || (e.touches && e.touches.length > 1)) {
                    isDrawing = false;
                    return;
                }
                isDrawing = true;
                const coords = getCoordinates(e);
                lastX = coords.x;
                lastY = coords.y;
                
                if (currentMode === 'pen') {
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    currentStrokePoints = [{ x: coords.x / canvas.width, y: coords.y / canvas.height }];
                } else if (currentMode === 'eraser') {
                    checkErase(coords.x, coords.y);
                }
            }

            function draw(e) {
                if (!isDrawing || (e.touches && e.touches.length > 1)) return;
                const coords = getCoordinates(e);

                if (currentMode === 'pen') {
                    ctx.beginPath();
                    ctx.moveTo(lastX, lastY);
                    ctx.lineTo(coords.x, coords.y);
                    ctx.lineWidth = thicknessInput.value * sharpnessFactor;
                    ctx.strokeStyle = colorInput.value;
                    ctx.stroke();

                    lastX = coords.x;
                    lastY = coords.y;
                    currentStrokePoints.push({ x: coords.x / canvas.width, y: coords.y / canvas.height });
                } else if (currentMode === 'eraser') {
                    checkErase(coords.x, coords.y);
                }
            }

            function stop() {
                if (isDrawing) {
                    isDrawing = false;
                    if(currentMode === 'pen' && currentStrokePoints.length > 0) {
                        drawingHistory[pageNum].push({
                            points: currentStrokePoints,
                            color: colorInput.value,
                            thickness: thicknessInput.value / (currentScale / 1.3)
                        });
                    }
                }
            }

            canvas.addEventListener('mousedown', start);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stop);

            // Phase 1: High Performance 60FPS CSS Transform Logic (Pinch to Zoom)
            canvas.addEventListener('touchstart', (e) => { 
                if (e.touches.length === 1) {
                    e.preventDefault(); 
                    start(e);
                } else if (e.touches.length === 2) {
                    isDrawing = false; 
                    transformLayer.classList.add('pinching');
                    startTouchDistance = Math.hypot(
                        e.touches[0].clientX - e.touches[1].clientX,
                        e.touches[0].clientY - e.touches[1].clientY
                    );
                }
            }, { passive: false });
            
            canvas.addEventListener('touchmove', (e) => { 
                if (e.touches.length === 1 && isDrawing) {
                    e.preventDefault(); 
                    draw(e); 
                } else if (e.touches.length === 2) {
                    e.preventDefault(); // Lock native browser zoom mechanics
                    const currentDistance = Math.hypot(
                        e.touches[0].clientX - e.touches[1].clientX,
                        e.touches[0].clientY - e.touches[1].clientY
                    );
                    
                    if (startTouchDistance > 0) {
                        // Smoothly adjust scale using GPU composited CSS matrix transforms
                        let factor = currentDistance / startTouchDistance;
                        currentTransformScale = Math.min(Math.max(baseTransformScale * factor, MIN_SCALE / currentScale), MAX_SCALE / currentScale);
                        transformLayer.style.transform = `scale(${currentTransformScale})`;
                    }
                }
            }, { passive: false });
            
            canvas.addEventListener('touchend', (e) => {
                stop();
                if (e.touches.length < 2 && transformLayer.classList.contains('pinching')) {
                    transformLayer.classList.remove('pinching');
                    
                    // Phase 2: Commit Phase. Re-render cleanly once user stops moving fingers
                    const updatedScale = currentScale * currentTransformScale;
                    currentScale = Math.min(Math.max(updatedScale, MIN_SCALE), MAX_SCALE);
                    
                    startTouchDistance = 0;
                    renderAllPages(); 
                }
            });
        }

        // Desktop Trackpad Zoom Support
        let isHoveringPDF = false;
        transformLayer.addEventListener('mouseenter', () => { isHoveringPDF = true; });
        transformLayer.addEventListener('mouseleave', () => { isHoveringPDF = false; });

        window.addEventListener('wheel', function(e) {
            if (e.ctrlKey) {
                if (isHoveringPDF) {
                    e.preventDefault(); 
                    let newScale = currentScale * (1 - e.deltaY * 0.002);
                    newScale = Math.min(Math.max(newScale, MIN_SCALE), MAX_SCALE);

                    if (newScale !== currentScale) {
                        currentScale = newScale;
                        if(window.zoomTimeout) cancelAnimationFrame(window.zoomTimeout);
                        window.zoomTimeout = requestAnimationFrame(() => { renderAllPages(); });
                    }
                } else {
                    e.preventDefault();
                }
            }
        }, { passive: false });

        opacityInput.addEventListener('input', (e) => {
            opacityVal.textContent = Math.round(e.target.value * 100) + '%';
            document.querySelectorAll('.annotation-canvas').forEach(c => c.style.opacity = e.target.value);
        });

        function startResize() {
            isDraggingResizer = true;
            dragBar.classList.add('dragging');
            mainContainer.classList.add('dragging-active');
        }

        function handleResize(clientX, clientY) {
            if (!isDraggingResizer) return;
            if (window.innerWidth < 600 && window.innerHeight > window.innerWidth) {
                let percentage = (clientY / window.innerHeight) * 100;
                if (percentage > 15 && percentage < 85) {
                    leftPanel.style.height = percentage + '%';
                    leftPanel.style.width = "100%";
                    rightPanel.style.height = (100 - percentage) + '%';
                    rightPanel.style.width = "100%";
                }
            } else {
                let percentage = (clientX / window.innerWidth) * 100;
                if (percentage > 15 && percentage < 85) {
                    leftPanel.style.width = percentage + '%';
                    leftPanel.style.height = "100%";
                }
            }
        }

        function stopResize() {
            if (isDraggingResizer) {
                isDraggingResizer = false;
                dragBar.classList.remove('dragging');
                mainContainer.classList.remove('dragging-active');
            }
        }

        dragBar.addEventListener('mousedown', startResize);
        document.addEventListener('mousemove', (e) => handleResize(e.clientX, e.clientY));
        document.addEventListener('mouseup', stopResize);
        dragBar.addEventListener('touchstart', startResize);
        document.addEventListener('touchmove', (e) => {
            if (e.touches.length > 0) handleResize(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: true });
        document.addEventListener('touchend', stopResize);
    </script>
</body>
</html>
