<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2015 FCE 1 Test 1 U+R Split Screen</title>
    <!-- Load Mozilla's PDF.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100%;
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
            background: #1e1e1e;
            /* Prevents pull-to-refresh on mobile browsers */
            overscroll-behavior-y: contain; 
        }

        .container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        .split {
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* Left Side: Google Form */
        .left-side {
            width: 50%; 
            min-width: 150px;
            background: #ffffff;
        }

        .left-side iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* The Draggable Resizer Bar (Enlarged hit area for mobile touch dragging) */
        .resizer {
            width: 12px;
            height: 100%;
            background: #ccc;
            cursor: col-resize;
            z-index: 20;
            position: relative;
            touch-action: none; /* Prevents browser scroll fighting */
        }
        .resizer::after {
            content: '';
            position: absolute;
            left: 4px;
            top: 0;
            width: 4px;
            height: 100%;
            background: #999;
        }
        .resizer:hover::after, .resizer.dragging::after { background: #007bff; }

        /* Right Side Layout */
        .right-side {
            flex: 1; 
            min-width: 150px;
            background: #525659;
        }

        .toolbar {
            background: #ffffff;
            padding: 8px 12px;
            display: flex;
            gap: 10px;
            align-items: center;
            border-bottom: 1px solid #ccc;
            z-index: 30;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
        }

        /* Tool Mode Buttons styling */
        .tool-btn {
            padding: 6px 10px;
            font-size: 13px;
            font-weight: bold;
            border: 1px solid #ccc;
            background: #f8f9fa;
            cursor: pointer;
            border-radius: 4px;
            touch-action: manipulation;
        }
        .tool-btn.active {
            background: #007bff;
            color: white;
            border-color: #0056b3;
        }
        
        .fullscreen-btn {
            margin-left: auto;
            background: #28a745;
            color: white;
            border-color: #1e7e34;
        }
        .fullscreen-btn:hover {
            background: #218838;
        }

        /* The Scroll Container for Pages */
        .pdf-scroll-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        /* Wrapper for an individual page + its canvas */
        .page-wrapper {
            position: relative;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            background: white;
            max-width: 100%;
        }

        /* The actual canvas rendering the PDF text/images */
        .pdf-page-canvas {
            display: block;
            z-index: 1;
            max-width: 100%;
            height: auto !important;
        }

        /* The drawing canvas stacked perfectly over that specific page */
        .annotation-canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
            opacity: 0.5; /* Adjusted default opacity */
            max-width: 100%;
            height: auto !important;
            touch-action: none; /* Crucial: custom handling overrides browser assumptions */
        }
        
        .annotation-canvas.pen-mode { cursor: crosshair; }
        .annotation-canvas.eraser-mode { cursor: pointer; }

        .dragging-active iframe {
            pointer-events: none;
        }

        #loading-text { color: white; font-weight: bold; margin-top: 20px; text-align: center; line-height: 1.5; }

        /* Mobile Phone Portrait Mode (Stack vertically if screen is narrow and upright) */
        @media (max-width: 600px) and (orientation: portrait) {
            .container {
                flex-direction: column;
            }
            .left-side {
                width: 100% !important;
                height: 45%;
            }
            .resizer {
                width: 100%;
                height: 12px;
                cursor: row-resize;
            }
            .resizer::after {
                left: 0;
                top: 4px;
                width: 100%;
                height: 4px;
            }
            .right-side {
                width: 100% !important;
                height: 55%;
            }
            .fullscreen-btn {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>

    <div class="container" id="main-container">
        
        <!-- LEFT PANEL: Google Form -->
        <div class="split left-side" id="left-panel">
            <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSc_ucH7zf5AQ3J4bfP2thNjO06bPlhBciNCedu7uVK3QO1s3A/viewform?embedded=true">Loading…</iframe>
        </div>

        <!-- MIDDLE RESIZER -->
        <div class="resizer" id="drag-bar"></div>

        <!-- RIGHT PANEL: Scrollable PDF Canvas Screen -->
        <div class="split right-side" id="right-panel">
            
            <div class="toolbar">
                <button id="btn-pen" class="tool-btn active">✏️ Pen</button>
                <button id="btn-eraser" class="tool-btn">🧽 Rubber</button>

                <div class="control-group" id="color-group">
                    <label for="color">Color:</label>
                    <input type="color" id="color" value="#ff0000">
                </div>
                <div class="control-group">
                    <label for="thickness">Size:</label>
                    <input type="range" id="thickness" min="1" max="20" value="3" style="width: 50px;">
                </div>
                <div class="control-group" id="opacity-group">
                    <label for="opacity">Opacity:</label>
                    <input type="range" id="opacity" min="0.1" max="1" step="0.1" value="0.5" style="width: 50px;">
                    <span id="opacity-val">50%</span>
                </div>
                <span id="zoom-display" style="font-size: 12px; font-weight: bold; color: #007bff;">Zoom: 100%</span>
                <button id="btn-fullscreen" class="tool-btn fullscreen-btn">📺 Fullscreen</button>
            </div>

            <div class="pdf-scroll-container" id="pdf-viewer-container">
                <div id="loading-text">Loading exam paper structure...</div>
            </div>

        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        const pdfUrl = '2015FCE1-1UR.pdf';

        const viewerContainer = document.getElementById('pdf-viewer-container');
        const leftPanel = document.getElementById('left-panel');
        const rightPanel = document.getElementById('right-panel');
        const dragBar = document.getElementById('drag-bar');
        const mainContainer = document.getElementById('main-container');

        const colorInput = document.getElementById('color');
        const thicknessInput = document.getElementById('thickness');
        const opacityInput = document.getElementById('opacity');
        const opacityVal = document.getElementById('opacity-val');
        const zoomDisplay = document.getElementById('zoom-display');

        const btnPen = document.getElementById('btn-pen');
        const btnEraser = document.getElementById('btn-eraser');
        const btnFullscreen = document.getElementById('btn-fullscreen');
        const colorGroup = document.getElementById('color-group');
        const opacityGroup = document.getElementById('opacity-group');

        let pdfDoc = null;
        let isDraggingResizer = false;
        let isDrawing = false;
        let lastX = 0, lastY = 0;
        
        // Pick an ideal responsive scaling baseline
        let currentScale = window.innerWidth < 900 ? 0.9 : 1.3; 
        const MIN_SCALE = 0.4;
        const MAX_SCALE = 4.0;
        
        let drawingHistory = {}; 
        let currentMode = 'pen'; 

        // Touch Tracking Data for Pinch Zoom Calculations
        let touchStartDist = 0;
        let touchStartScale = 1.0;
        let isPinchZooming = false;
        let touchStartCenterY = 0;
        let scrollStartTop = 0;

        // Sharpness upgrade coefficient
        const sharpnessFactor = 1.2;

        // Toggle Tool Modes
        btnPen.addEventListener('click', () => {
            currentMode = 'pen';
            btnPen.classList.add('active');
            btnEraser.classList.remove('active');
            colorGroup.style.opacity = "1";
            opacityGroup.style.opacity = "1";
            document.querySelectorAll('.annotation-canvas').forEach(c => c.className = 'annotation-canvas pen-mode');
        });

        btnEraser.addEventListener('click', () => {
            currentMode = 'eraser';
            btnEraser.classList.add('active');
            btnPen.classList.remove('active');
            colorGroup.style.opacity = "0.3"; 
            opacityGroup.style.opacity = "0.3";
            document.querySelectorAll('.annotation-canvas').forEach(c => c.className = 'annotation-canvas eraser-mode');
        });

        // Fullscreen Toggle Controller Action Hook
        btnFullscreen.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().then(() => {
                    btnFullscreen.textContent = "❌ Exit";
                }).catch(err => {
                    console.error(`Error attempting to enable fullscreen: ${err.message}`);
                });
            } else {
                document.exitFullscreen().then(() => {
                    btnFullscreen.textContent = "📺 Fullscreen";
                });
            }
        });

        // Sync button text if full screen changes via hardware buttons or escape key
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                btnFullscreen.textContent = "📺 Fullscreen";
            }
        });

        // Initialize and load the PDF document
        pdfjsLib.getDocument(pdfUrl).promise.then(pdf => {
            pdfDoc = pdf;
            document.getElementById('loading-text').remove();
            renderAllPages();
        }).catch(err => {
            document.getElementById('loading-text').innerHTML = 'Error loading PDF file.';
            console.error(err);
        });

        function renderAllPages() {
            // Keep track of scroll depth position so zoom doesn't disorient user
            const currentScrollTop = viewerContainer.scrollTop;
            
            viewerContainer.innerHTML = '';
            for (let pageNum = 1; pageNum <= pdfDoc.numPages; pageNum++) {
                if (!drawingHistory[pageNum]) drawingHistory[pageNum] = [];
                renderPage(pageNum);
            }
            zoomDisplay.textContent = `Zoom: ${Math.round(currentScale * 100)}%`;
            viewerContainer.scrollTop = currentScrollTop;
        }

        function renderPage(pageNum) {
            pdfDoc.getPage(pageNum).then(page => {
                const viewport = page.getViewport({ scale: currentScale });

                const wrapper = document.createElement('div');
                wrapper.className = 'page-wrapper';
                wrapper.style.width = viewport.width + 'px';
                wrapper.style.height = viewport.height + 'px';

                const pdfCanvas = document.createElement('canvas');
                pdfCanvas.className = 'pdf-page-canvas';
                // Multiply backing-store dimensions for internal crispness boost
                pdfCanvas.width = viewport.width * sharpnessFactor;
                pdfCanvas.height = viewport.height * sharpnessFactor;
                pdfCanvas.style.width = viewport.width + 'px';
                pdfCanvas.style.height = viewport.height + 'px';
                
                const pdfContext = pdfCanvas.getContext('2d');
                pdfContext.scale(sharpnessFactor, sharpnessFactor);

                const drawingCanvas = document.createElement('canvas');
                drawingCanvas.className = `annotation-canvas ${currentMode}-mode`;
                drawingCanvas.width = viewport.width * sharpnessFactor;
                drawingCanvas.height = viewport.height * sharpnessFactor;
                drawingCanvas.style.width = viewport.width + 'px';
                drawingCanvas.style.height = viewport.height + 'px';
                
                wrapper.appendChild(pdfCanvas);
                wrapper.appendChild(drawingCanvas);
                viewerContainer.appendChild(wrapper);

                page.render({ canvasContext: pdfContext, viewport: viewport });
                
                redrawPageAnnotations(pageNum, drawingCanvas);
                setupDrawingEvents(pageNum, drawingCanvas);
            });
        }

        function redrawPageAnnotations(pageNum, canvas) {
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            canvas.style.opacity = opacityInput.value;

            const pageHistory = drawingHistory[pageNum] || [];
            pageHistory.forEach(stroke => {
                if (stroke.points.length < 1) return;
                ctx.beginPath();
                
                const startX = stroke.points[0].x * canvas.width;
                const startY = stroke.points[0].y * canvas.height;
                ctx.moveTo(startX, startY);

                for(let i = 1; i < stroke.points.length; i++) {
                    const nextX = stroke.points[i].x * canvas.width;
                    const nextY = stroke.points[i].y * canvas.height;
                    ctx.lineTo(nextX, nextY);
                }
                ctx.lineWidth = stroke.thickness * sharpnessFactor * (currentScale / 1.3);
                ctx.strokeStyle = stroke.color;
                ctx.stroke();
            });
        }

        function setupDrawingEvents(pageNum, canvas) {
            const ctx = canvas.getContext('2d');
            let currentStrokePoints = [];

            function getCoordinates(e) {
                const rect = canvas.getBoundingClientRect();
                let clientX, clientY;
                if (e.touches && e.touches.length > 0) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }
                return {
                    // Coordinate offset accounts for structural sharpness dimensions
                    x: (clientX - rect.left) * sharpnessFactor,
                    y: (clientY - rect.top) * sharpnessFactor
                };
            }

            function checkErase(x, y) {
                const normX = x / canvas.width;
                const normY = y / canvas.height;
                // Scale structural erase boundaries relative to current scale factors
                const eraseRadius = (thicknessInput.value * sharpnessFactor / canvas.width) * 4.0; 
                
                let pageHistory = drawingHistory[pageNum] || [];
                let modified = false;

                for (let i = pageHistory.length - 1; i >= 0; i--) {
                    const stroke = pageHistory[i];
                    for (let p = 0; p < stroke.points.length; p++) {
                        const pt = stroke.points[p];
                        const distance = Math.sqrt((pt.x - normX)**2 + (pt.y - normY)**2);
                        
                        if (distance < eraseRadius) {
                            pageHistory.splice(i, 1); 
                            modified = true;
                            break;
                        }
                    }
                }
                
                if (modified) {
                    drawingHistory[pageNum] = pageHistory;
                    redrawPageAnnotations(pageNum, canvas);
                }
            }

            function start(e) {
                if (isDraggingResizer) return;
                
                // MULTI-TOUCH INTRODUCED: Turn off individual ink tracking
                if (e.touches && e.touches.length > 1) {
                    isDrawing = false;
                    return; 
                }

                isDrawing = true;
                const coords = getCoordinates(e);
                lastX = coords.x;
                lastY = coords.y;
                
                if (currentMode === 'pen') {
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    currentStrokePoints = [{ x: coords.x / canvas.width, y: coords.y / canvas.height }];
                } else if (currentMode === 'eraser') {
                    checkErase(coords.x, coords.y);
                }
            }

            function draw(e) {
                if (!isDrawing) return;
                if (e.touches && e.touches.length > 1) return; // ignore standard brush ink steps

                const coords = getCoordinates(e);

                if (currentMode === 'pen') {
                    ctx.beginPath();
                    ctx.moveTo(lastX, lastY);
                    ctx.lineTo(coords.x, coords.y);
                    ctx.lineWidth = thicknessInput.value * sharpnessFactor;
                    ctx.strokeStyle = colorInput.value;
                    ctx.stroke();

                    lastX = coords.x;
                    lastY = coords.y;
                    currentStrokePoints.push({ x: coords.x / canvas.width, y: coords.y / canvas.height });
                } else if (currentMode === 'eraser') {
                    checkErase(coords.x, coords.y);
                }
            }

            function stop() {
                if (isDrawing) {
                    isDrawing = false;
                    if(currentMode === 'pen' && currentStrokePoints.length > 0) {
                        drawingHistory[pageNum].push({
                            points: currentStrokePoints,
                            color: colorInput.value,
                            thickness: thicknessInput.value / (currentScale / 1.3)
                        });
                    }
                }
            }

            // Mouse Event Listeners
            canvas.addEventListener('mousedown', start);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stop);
            canvas.addEventListener('mouseleave', stop);

            // Native Mobile Multi-Touch Navigation Logic
            canvas.addEventListener('touchstart', (e) => { 
                if (e.touches.length === 1) {
                    e.preventDefault(); 
                    start(e);
                } else if (e.touches.length === 2) {
                    isDrawing = false; // Safety lock
                    
                    // Measure baseline hypotenuse line vector distance between finger A and B
                    touchStartDist = Math.hypot(
                        e.touches[0].clientX - e.touches[1].clientX,
                        e.touches[0].clientY - e.touches[1].clientY
                    );
                    touchStartScale = currentScale;

                    // Initialize custom viewport scroll offset targets concurrently
                    touchStartCenterY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                    scrollStartTop = viewerContainer.scrollTop;
                    isPinchZooming = (Math.abs(e.touches[0].clientX - e.touches[1].clientX) > Math.abs(e.touches[0].clientY - e.touches[1].clientY));
                }
            }, { passive: false });
            
            canvas.addEventListener('touchmove', (e) => { 
                if (e.touches.length === 1 && isDrawing) {
                    e.preventDefault(); 
                    draw(e); 
                } else if (e.touches.length === 2) {
                    // Do not apply preventDefault(), allowing natural native viewport track scrolling to happen
                    const currentCenterY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                    
                    // Track vertical scroll displacement
                    const yDelta = currentCenterY - touchStartCenterY;
                    viewerContainer.scrollTop = scrollStartTop - yDelta;
                    
                    // Calculate relative scale distance delta vector
                    const dist = Math.hypot(
                        e.touches[0].clientX - e.touches[1].clientX,
                        e.touches[0].clientY - e.touches[1].clientY
                    );
                    
                    if (touchStartDist > 0) {
                        let factor = dist / touchStartDist;
                        let newScale = touchStartScale * factor;
                        
                        if (newScale < MIN_SCALE) newScale = MIN_SCALE;
                        if (newScale > MAX_SCALE) newScale = MAX_SCALE;
                        
                        // Limit canvas context rendering re-evaluations to structural updates
                        if(Math.abs(newScale - currentScale) > 0.04) {
                            currentScale = newScale;
                            renderAllPages();
                        }
                    }
                }
            }, { passive: false });
            
            canvas.addEventListener('touchend', (e) => {
                stop();
                if (e.touches.length < 2) {
                    touchStartDist = 0;
                }
            });
        }

        // Global Trackpad Command Zoom Catcher Hook
        let isHoveringPDF = false;
        viewerContainer.addEventListener('mouseenter', () => { isHoveringPDF = true; });
        viewerContainer.addEventListener('mouseleave', () => { isHoveringPDF = false; });

        window.addEventListener('wheel', function(e) {
            if (e.ctrlKey) {
                if (isHoveringPDF) {
                    e.preventDefault(); 
                    let zoomFactor = 1 - e.deltaY * 0.002; 
                    let newScale = currentScale * zoomFactor;

                    if (newScale < MIN_SCALE) newScale = MIN_SCALE;
                    if (newScale > MAX_SCALE) newScale = MAX_SCALE;

                    if (newScale !== currentScale) {
                        currentScale = newScale;
                        if(window.zoomTimeout) cancelAnimationFrame(window.zoomTimeout);
                        window.zoomTimeout = requestAnimationFrame(() => { renderAllPages(); });
                    }
                } else {
                    e.preventDefault();
                }
            }
        }, { passive: false });

        opacityInput.addEventListener('input', (e) => {
            opacityVal.textContent = Math.round(e.target.value * 100) + '%';
            document.querySelectorAll('.annotation-canvas').forEach(c => c.style.opacity = e.target.value);
        });

        // Split-Screen Resize Event Controls (Works for both Mouse & Finger Touch dragging)
        function startResize() {
            isDraggingResizer = true;
            dragBar.classList.add('dragging');
            mainContainer.classList.add('dragging-active');
        }

        function handleResize(clientX, clientY) {
            if (!isDraggingResizer) return;
            
            // Check orientation to allow splitting left/right or top/bottom
            if (window.innerWidth < 600 && window.innerHeight > window.innerWidth) {
                // Portrait stack resizing logic
                let percentage = (clientY / window.innerHeight) * 100;
                if (percentage > 15 && percentage < 85) {
                    leftPanel.style.height = percentage + '%';
                    leftPanel.style.width = "100%";
                    rightPanel.style.height = (100 - percentage) + '%';
                    rightPanel.style.width = "100%";
                }
            } else {
                // Landscape split side-by-side resizing logic
                let percentage = (clientX / window.innerWidth) * 100;
                if (percentage > 15 && percentage < 85) {
                    leftPanel.style.width = percentage + '%';
                    leftPanel.style.height = "100%";
                }
            }
        }

        function stopResize() {
            if (isDraggingResizer) {
                isDraggingResizer = false;
                dragBar.classList.remove('dragging');
                mainContainer.classList.remove('dragging-active');
            }
        }

        // Mouse Drag Resizer Binding hooks
        dragBar.addEventListener('mousedown', startResize);
        document.addEventListener('mousemove', (e) => handleResize(e.clientX, e.clientY));
        document.addEventListener('mouseup', stopResize);

        // Mobile Touch Drag Resizer Binding hooks
        dragBar.addEventListener('touchstart', (e) => { startResize(); });
        document.addEventListener('touchmove', (e) => {
            if (e.touches.length > 0) handleResize(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: true });
        document.addEventListener('touchend', stopResize);
    </script>
</body>
</html>
